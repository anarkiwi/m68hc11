name: Publish to PyPI

# Publishes on a GitHub Release using PyPI Trusted Publishing (OIDC).
# No API tokens are stored: the `pypi` environment + `id-token: write` let
# GitHub mint a short-lived token PyPI trusts. Configure the trusted publisher
# on PyPI for project `m68hc11` (owner anarkiwi, repo m68hc11, workflow
# publish.yml, environment pypi) before the first release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/m68hc11
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
